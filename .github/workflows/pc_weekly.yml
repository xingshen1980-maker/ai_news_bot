name: PC Market Weekly Report

on:
  schedule:
    # 每周五北京时间8点运行 (UTC 0点)
    - cron: '0 0 * * 5'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests pillow beautifulsoup4

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -fv

      - name: Run PC Market Weekly Report
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          PC_RECIPIENT_EMAIL: "24318868@qq.com"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: "https://sky.tinyandbeautiful.com"
        run: |
          python pc_main.py
